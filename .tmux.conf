# Colors - true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Extended keys: disabled — Ghostty's Kitty-keyboard CSI-u encoding was
# mangling pasted newlines (LF=Ctrl+J -> literal "j"). Shift+Enter is handled
# directly by Ghostty's `shift+enter=text:\x1b\r` keybind, so this isn't needed.
set -g extended-keys off

# Pull colors from local profile
set-option -g status-bg "$TMUX_COLOR_BG"
set-option -g status-fg "$TMUX_COLOR_FG"

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Display hostname and current window name in title bar
set-option -g set-titles on
set-option -g set-titles-string '#h | #W'
set-window-option -g automatic-rename on
set -g allow-rename on

# Non-vim-interfering prefix key (both C-a and C-b work)
set-option -g prefix C-a
set-option -g prefix2 C-b
bind-key a send-keys C-a
bind-key C-a send-keys C-a

# Vi-ish keybindings
setw -g mode-keys vi
set-option -g status-keys vi
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Make Ctrl+Arrows work
setw -g xterm-keys on

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Active window stands out (swap fg/bg)
setw -g window-status-current-style 'reverse'

setw -g aggressive-resize on

set -g history-limit 10000

# Reduce escape delay (important for vim)
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# Focus events (for vim autoread)
set -g focus-events on

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Claude session: use pane title for window name, orange text
set-hook -g session-created {
    if -F "#{==:#{session_name},claude}" {
        setw automatic-rename on
        setw automatic-rename-format '#{pane_title}'
        set status-bg black
        set status-fg colour209
        set status-right '%H:%M %d-%b-%y'
    }
}

# Cycle sessions
bind Tab switch-client -n
bind BTab switch-client -p

# Quick window navigation with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Smart pane switching with awareness of vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"